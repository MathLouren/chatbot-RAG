<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bela — Microware</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #0047AB;
      --primary-light: #1a6ef5;
      --primary-dark: #003380;
      --bg: #f0f4f8;
      --surface: #ffffff;
      --user-bubble: #0047AB;
      --bot-bubble: #ffffff;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(0,71,171,0.10);
      --radius: 18px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      z-index: 10;
    }
    .avatar-header {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header p  { font-size: 0.78rem; opacity: 0.85; margin-top: 1px; }

    .status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #22c55e;
      display: inline-block; margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }

    .header-actions {
      margin-left: auto;
      display: flex; gap: 8px;
    }
    .btn-icon {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: background 0.2s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.25); }

    /* ── Chat area ── */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar { width: 5px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .welcome-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(0,71,171,0.25);
    }
    .welcome h2 { color: var(--text); font-size: 1.3rem; margin-bottom: 8px; }
    .welcome p  { font-size: 0.88rem; line-height: 1.6; max-width: 360px; margin: 0 auto; }

    .quick-btns {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 20px;
    }
    .quick-btn {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.82rem;
      color: var(--primary);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .quick-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* ── Messages ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      color: white;
    }
    .msg-row.user .msg-avatar {
      background: linear-gradient(135deg, #64748b, #94a3b8);
    }

    .bubble {
      max-width: min(72%, 560px);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.6;
      box-shadow: var(--shadow);
      word-break: break-word;
    }
    .msg-row.bot .bubble {
      background: var(--bot-bubble);
      color: var(--text);
      border-bottom-left-radius: var(--radius-sm);
    }
    .msg-row.user .bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: var(--radius-sm);
    }

    /* Markdown dentro do bubble */
    .bubble table {
      width: 100%; border-collapse: collapse;
      margin: 10px 0; font-size: 0.82rem;
    }
    .bubble th {
      background: var(--primary); color: white;
      padding: 7px 10px; text-align: left;
    }
    .bubble td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }
    .bubble tr:nth-child(even) td { background: #f8fafc; }
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }
    .bubble p { margin-bottom: 6px; }
    .bubble p:last-child { margin-bottom: 0; }

    .msg-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 3px;
      padding: 0 4px;
    }
    .msg-row.user .msg-time { text-align: right; }

    /* ── Typing indicator ── */
    .typing-bubble {
      background: white;
      border-radius: var(--radius);
      border-bottom-left-radius: var(--radius-sm);
      padding: 14px 18px;
      box-shadow: var(--shadow);
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      opacity: 0.7;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px;
      background: white;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      display: flex;
      align-items: flex-end;
      padding: 8px 16px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--primary); }

    textarea {
      flex: 1;
      border: none; outline: none;
      background: transparent;
      resize: none;
      font-family: inherit;
      font-size: 0.92rem;
      color: var(--text);
      max-height: 120px;
      line-height: 1.5;
    }
    textarea::placeholder { color: #9ca3af; }

    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: var(--primary-light); transform: scale(1.05); }
    .send-btn:disabled { background: #94a3b8; transform: none; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: white;
      padding: 10px 20px; border-radius: 8px;
      font-size: 0.83rem; z-index: 999;
      animation: fadeInOut 2.5s forwards;
    }
    @keyframes fadeInOut {
      0% { opacity:0; transform: translateX(-50%) translateY(10px); }
      15%,75% { opacity:1; transform: translateX(-50%) translateY(0); }
      100% { opacity:0; }
    }

    /* ── Responsivo ── */
    @media (max-width: 500px) {
      .bubble { max-width: 88%; font-size: 0.85rem; }
      header h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="avatar-header">🤖</div>
    <div>
      <h1>Bela</h1>
      <p><span class="status-dot"></span>Microware — Atendimento virtual</p>
    </div>
    <div class="header-actions">
      <button class="btn-icon" @click="clearSession" title="Nova conversa">🗑 Nova conversa</button>
    </div>
  </header>

  <!-- Chat -->
  <div class="chat-container" ref="chatBox" scroll-behavior="smooth">

    <!-- Welcome -->
    <div class="welcome" v-if="messages.length === 0">
      <div class="welcome-avatar">🛍️</div>
      <h2>Olá! Sou a Bela 👋</h2>
      <p>Sua assistente virtual da <strong>Microware</strong>. Posso te ajudar a encontrar produtos, verificar preços e estoque!</p>
      <div class="quick-btns">
        <button class="quick-btn" v-for="q in quickQuestions" :key="q" @click="sendQuick(q)">{{ q }}</button>
      </div>
    </div>

    <!-- Messages -->
    <template v-for="msg in messages" :key="msg.id">
      <div class="msg-row" :class="msg.role">
        <div class="msg-avatar">{{ msg.role === 'bot' ? '🤖' : '👤' }}</div>
        <div>
          <div class="bubble" v-html="renderMarkdown(msg.content)"></div>
          <div class="msg-time">{{ msg.time }}</div>
        </div>
      </div>
    </template>

    <!-- Typing -->
    <div class="msg-row bot" v-if="isTyping">
      <div class="msg-avatar">🤖</div>
      <div class="typing-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        v-model="inputText"
        placeholder="Digite sua mensagem..."
        rows="1"
        @keydown.enter.prevent="handleEnter"
        @input="autoResize"
        ref="inputRef"
        :disabled="isTyping"
      ></textarea>
    </div>
    <button class="send-btn" @click="sendMessage" :disabled="!inputText.trim() || isTyping">➤</button>
  </div>

  <!-- Toast -->
  <div class="toast" v-if="toast">{{ toast }}</div>

</div>

<script>
const { createApp, ref, nextTick, onMounted } = Vue;

const API_URL = "http://localhost:8000";

createApp({
  setup() {
    const messages   = ref([]);
    const inputText  = ref("");
    const isTyping   = ref(false);
    const sessionId  = ref(null);
    const chatBox    = ref(null);
    const inputRef   = ref(null);
    const toast      = ref("");

    const quickQuestions = [
      "Tem iPhone? 📱",
      "Qual o nobreak mais barato? 🔌",
      "Tem monitor? 🖥️",
      "Qual o celular Samsung mais barato? 📲",
    ];

    function renderMarkdown(text) {
      return marked.parse(text || "");
    }

    function now() {
      return new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
    }

    function showToast(msg) {
      toast.value = msg;
      setTimeout(() => toast.value = "", 2600);
    }

    async function scrollDown() {
      await nextTick();
      if (chatBox.value) chatBox.value.scrollTop = chatBox.value.scrollHeight;
    }

    async function ensureSession() {
      if (sessionId.value) return;
      try {
        const res  = await fetch(`${API_URL}/session/new`, { method: "POST" });
        const data = await res.json();
        sessionId.value = data.session_id;
        localStorage.setItem("bela_session_id", sessionId.value);
      } catch {
        sessionId.value = crypto.randomUUID();
      }
    }

    async function sendMessage() {
      const text = inputText.value.trim();
      if (!text || isTyping.value) return;

      await ensureSession();
      inputText.value = "";
      autoResize();

      messages.value.push({ id: Date.now(), role: "user", content: text, time: now() });
      await scrollDown();

      isTyping.value = true;
      const botMsgId = Date.now() + 1;
      let botContent = "";

      try {
        // Usa SSE streaming
        const url = `${API_URL}/chat/stream?session_id=${encodeURIComponent(sessionId.value)}&message=${encodeURIComponent(text)}`;
        const evtSource = new EventSource(url);

        messages.value.push({ id: botMsgId, role: "bot", content: "", time: now() });
        isTyping.value = false;

        evtSource.onmessage = async (e) => {
          const data = JSON.parse(e.data);
          if (data.type === "token") {
            botContent += data.content;
            const idx = messages.value.findIndex(m => m.id === botMsgId);
            if (idx !== -1) messages.value[idx].content = botContent;
            await scrollDown();
          } else if (data.type === "done" || data.type === "error") {
            evtSource.close();
            if (data.type === "error") showToast("Erro ao processar resposta.");
          }
        };

        evtSource.onerror = () => {
          evtSource.close();
          const idx = messages.value.findIndex(m => m.id === botMsgId);
          if (idx !== -1 && !messages.value[idx].content) {
            messages.value[idx].content = "⚠️ Não consegui me conectar à API. Verifique se ela está rodando.";
          }
        };

      } catch (err) {
        isTyping.value = false;
        messages.value.push({
          id: Date.now(), role: "bot",
          content: "⚠️ Erro de conexão. Verifique se a API está rodando em `localhost:8000`.",
          time: now()
        });
        await scrollDown();
      }
    }

    function handleEnter(e) {
      if (e.shiftKey) return;
      sendMessage();
    }

    function autoResize() {
      nextTick(() => {
        const ta = inputRef.value;
        if (!ta) return;
        ta.style.height = "auto";
        ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
      });
    }

    function sendQuick(q) {
      inputText.value = q;
      sendMessage();
    }

    async function clearSession() {
      if (!sessionId.value) return;
      try {
        await fetch(`${API_URL}/session/${sessionId.value}`, { method: "DELETE" });
      } catch {}
      sessionId.value = null;
      messages.value = [];
      localStorage.removeItem("bela_session_id");
      showToast("Nova conversa iniciada!");
    }

    onMounted(() => {
      const saved = localStorage.getItem("bela_session_id");
      if (saved) sessionId.value = saved;
      inputRef.value?.focus();
    });

    return {
      messages, inputText, isTyping, chatBox, inputRef, toast,
      quickQuestions, renderMarkdown, sendMessage, handleEnter,
      autoResize, sendQuick, clearSession,
    };
  }
}).mount("#app");
</script>
</body>
</html>
